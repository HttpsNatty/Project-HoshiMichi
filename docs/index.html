<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>HoshiMichi • Caminho das Estrelas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 15 L61 40 L87 40 L66 57 L74 82 L50 66 L26 82 L34 57 L13 40 L39 40 Z' fill='%23FFD700'/></svg>">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #101835 0%, #050a18 100%);
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .stars {
            width: 2px;
            height: 2px;
            background: white;
            position: absolute;
            animation: twinkle 2s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.3;
            }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo-svg {
            width: 45px;
            height: 45px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #a2b1ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        h1 ruby {
            -webkit-text-fill-color: initial;
            color: white;
        }

        h1 rt {
            font-size: 1rem;
            color: #ffd700;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .romaji {
            font-size: 1rem;
            color: #b0b8d4;
            display: block;
            margin-top: -5px;
            font-weight: 400;
            text-transform: lowercase;
        }

        .slogan {
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            width: 360px;
            margin: auto;
            font-size: 1.5rem;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.1);
        }

        button {
            background: #1e2d5a;
            border: none;
            padding: 10px 20px;
            margin: 15px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        button:hover {
            background: #2d47a1;
        }

        .tab-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(30, 45, 90, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            color: #b0b8d4;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .tab-btn:hover {
            background: rgba(45, 71, 161, 0.4);
            color: white;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #4556a1;
            color: white;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }

        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.9rem;
            color: #b0b8d4;
            background: rgba(10, 15, 36, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 143, 177, 0.3);
            transition: 0.3s;
            padding: 6px 0;
            z-index: 1000;
        }

        #footer:hover {
            background: rgba(10, 15, 36, 0.95);
            border-top-color: rgba(255, 143, 177, 0.6);
        }

        #footer a {
            color: #ff8fb1;
            /* Rosa Nébula harmonioso */
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            position: relative;
        }

        #footer a:hover {
            color: #ffb8d1;
            text-shadow: 0 0 10px rgba(255, 143, 177, 0.5);
        }

        #footer a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #ff8fb1;
            transition: 0.3s;
        }

        #footer a:hover::after {
            width: 100%;
        }

        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            min-height: 420px;
        }

        .card-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .side-filters {
            width: 240px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            padding-right: 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        /* Scrollbar customizado */
        .side-filters::-webkit-scrollbar {
            width: 6px;
        }

        .side-filters::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        .side-filters::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .side-filters::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .options-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            color: #b0b8d4;
            font-size: 0.95rem;
        }

        .options-container.visible {
            display: flex;
        }

        #dynamic-filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .options-container label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .options-container label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(69, 86, 161, 0.4);
            color: white;
        }

        .options-container input[type="checkbox"],
        #check-memorize {
            accent-color: #4556a1;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Botão de Feedback */
        #mail-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffb86c;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #mail-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1) rotate(10deg);
        }

        /* Modal de Feedback */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.visible {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(20, 26, 48, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlide {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            margin-top: 0;
            color: #ffb86c;
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .modal-content input:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #4556a1;
            background: rgba(255, 255, 255, 0.07);
        }

        .modal-content textarea {
            height: 100px;
            resize: none;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #b0b8d4;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
        }

        .btn-send {
            background: #4556a1;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: #5669c2;
            transform: translateY(-2px);
        }

        .btn-send:disabled {
            background: #333;
            cursor: not-allowed;
            opacity: 0.5;
        }

        @media (max-width: 800px) {
            .main-layout {
                flex-direction: column;
                gap: 20px;
                min-height: auto;
                align-items: center;
            }

            .side-filters {
                width: 100%;
                max-height: 180px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding-right: 0;
            }

            .options-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            #dynamic-filters {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }


        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .card {
                width: 280px;
                padding: 30px;
                min-height: 160px;
            }

            .tab-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .options-container {
                font-size: 0.85rem;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="starfield"></div>

    <!-- <button id="mail-btn" onclick="toggleModal(true)" title="Enviar Sugestão">📬</button> -->

    <div class="modal" id="feedback-modal">
        <div class="modal-content">
            <h3>📬 Enviar Sugestão</h3>
            <p style="color: #b0b8d4; font-size: 0.9rem; margin-bottom: 20px;">
                Dúvidas ou sugestões? Envie uma mensagem diretamente para a Natty! 🌌
            </p>
            <input type="text" id="fb-nome" placeholder="Seu nome" required>
            <textarea id="fb-mensagem" placeholder="Sua mensagem..." required></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="toggleModal(false)">Cancelar</button>
                <button class="btn-send" id="btn-submit-fb" onclick="enviarFeedback()">Enviar</button>
            </div>
        </div>
    </div>

    <div class="container" style="position: relative; z-index: 100; padding: 15px 20px;">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M50 5L61.2257 39.541H97.4759L68.1251 60.918L79.3508 95.459L50 74.082L20.6492 95.459L31.8749 60.918L2.52414 39.541H38.7743L50 5Z"
                    fill="#FFD700" />
                <circle cx="50" cy="50" r="45" stroke="#FFD700" stroke-opacity="0.2" stroke-width="1" />
            </svg>
            <h1>
                <ruby>星道<rt>ほしみち</rt></ruby>
                <span class="romaji">hoshimichi</span>
            </h1>
            <div class="slogan">seu estudo é o caminho guiado pelas estrelas</div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="mudarCategoria('letras', this)">⭐ あ ア</button>
            <button class="tab-btn" onclick="mudarCategoria('números', this)">🔢 Números</button>
            <button class="tab-btn" onclick="mudarCategoria('vocabulário', this)">📖 Vocabulário</button>
            <button class="tab-btn" onclick="mudarCategoria('perguntas', this)">🧠 Perguntas da Prova</button>
            <button class="tab-btn" onclick="mudarCategoria('Verbos', this)">🏃 Verbos</button>
            <button class="tab-btn" onclick="mudarCategoria('Adjetivos', this)" disabled title="Categoria em construção">🔨 Adjetivos</button>
        </div>

        <div class="main-layout">
            <div class="side-filters">
                <div class="options-container visible" id="letras-options">
                    <label><input type="checkbox" id="check-hiragana" checked onchange="loadCategory()">
                        Hiragana</label>
                    <label><input type="checkbox" id="check-katakana" checked onchange="loadCategory()">
                        Katakana</label>
                    <label><input type="checkbox" id="check-kanji" onchange="loadCategory()"> Kanji</label>
                </div>

                <div class="options-container" id="números-options">
                    <label><input type="checkbox" id="check-numero" checked onchange="loadCategory()"> Número</label>
                    <div id="dynamic-filters-números"></div>
                </div>

                <div class="options-container" id="vocabulário-options">
                    <div id="dynamic-filters-vocabulário"></div>
                </div>

                <div class="options-container" id="verbos-options">
                    <label><input type="checkbox" id="check-verbo-negativa" checked onchange="loadCategory()"> Negativa</label>
                    <label><input type="checkbox" id="check-verbo-dicionario" checked onchange="loadCategory()"> Dicionário</label>
                    <label><input type="checkbox" id="check-verbo-te" checked onchange="loadCategory()"> Forma TE</label>
                    <label><input type="checkbox" id="check-verbo-passado" checked onchange="loadCategory()"> Passado</label>
                    <label><input type="checkbox" id="check-verbo-passadonegativo" checked onchange="loadCategory()"> Pass. Negativo</label>
                </div>
            </div>

            <div class="card-section">
                <div class="card" id="card">Clique para começar</div>

                <div class="controls-container">
                    <button onclick="anterior()">⬅️ Anterior</button>
                    <button onclick="proximo()">➡️ Próximo</button>
                </div>
            </div>
        </div>
    </div>
    <div id="footer">
        Desenvolvido por
        <a href="https://github.com/HttpsNatty" target="_blank">Natty</a>
    </div>

    <script>
        const hiraganaData = [
            ["あ", "a"], ["い", "i"], ["う", "u"], ["え", "e"], ["お", "o"],
            ["か", "ka"], ["き", "ki"], ["く", "ku"], ["け", "ke"], ["こ", "ko"],
            ["さ", "sa"], ["し", "shi"], ["す", "su"], ["せ", "se"], ["そ", "so"],
            ["た", "ta"], ["ち", "chi"], ["つ", "tsu"], ["て", "te"], ["と", "to"],
            ["な", "na"], ["に", "ni"], ["ぬ", "nu"], ["ね", "ne"], ["の", "no"],
            ["は", "ha"], ["ひ", "hi"], ["ふ", "fu"], ["へ", "he"], ["ほ", "ho"],
            ["ま", "ma"], ["み", "mi"], ["む", "mu"], ["め", "me"], ["も", "mo"],
            ["や", "ya"], ["ゆ", "yu"], ["よ", "yo"],
            ["ら", "ra"], ["り", "ri"], ["る", "ru"], ["れ", "re"], ["ろ", "ro"],
            ["わ", "wa"], ["を", "wo"], ["ん", "n"]
        ];

        const katakanaData = [
            ["ア", "a"], ["イ", "i"], ["ウ", "u"], ["エ", "e"], ["オ", "o"],
            ["カ", "ka"], ["キ", "ki"], ["ク", "ku"], ["ケ", "ke"], ["コ", "ko"],
            ["サ", "sa"], ["シ", "shi"], ["ス", "su"], ["セ", "se"], ["ソ", "so"],
            ["タ", "ta"], ["チ", "chi"], ["ツ", "tsu"], ["テ", "te"], ["ト", "to"],
            ["ナ", "na"], ["ニ", "ni"], ["ヌ", "nu"], ["ネ", "ne"], ["ノ", "no"],
            ["ハ", "ha"], ["ヒ", "hi"], ["フ", "fu"], ["ヘ", "he"], ["ホ", "ho"],
            ["マ", "ma"], ["ミ", "mi"], ["ム", "mu"], ["メ", "me"], ["モ", "mo"],
            ["ヤ", "ya"], ["ユ", "yu"], ["ヨ", "yo"],
            ["ラ", "ra"], ["リ", "ri"], ["ル", "ru"], ["レ", "re"], ["ロ", "ro"],
            ["ワ", "wa"], ["ヲ", "wo"], ["ン", "n"]
        ];

        // URLs
        const urls = {
            kanji: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTB0TRTvlkkQYdEXeYsQrExfJTBItnnxDSk_MKunRKOck_F6Zlr68SatfP_8s_AeQ6IHPsLJ6d3xxrG/pub?gid=866008096&single=true&output=tsv",
            números: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTB0TRTvlkkQYdEXeYsQrExfJTBItnnxDSk_MKunRKOck_F6Zlr68SatfP_8s_AeQ6IHPsLJ6d3xxrG/pub?gid=578594546&single=true&output=tsv",
            vocabulário: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTB0TRTvlkkQYdEXeYsQrExfJTBItnnxDSk_MKunRKOck_F6Zlr68SatfP_8s_AeQ6IHPsLJ6d3xxrG/pub?gid=0&single=true&output=tsv",
            perguntas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTB0TRTvlkkQYdEXeYsQrExfJTBItnnxDSk_MKunRKOck_F6Zlr68SatfP_8s_AeQ6IHPsLJ6d3xxrG/pub?gid=1797354773&single=true&output=tsv",
            verbos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTB0TRTvlkkQYdEXeYsQrExfJTBItnnxDSk_MKunRKOck_F6Zlr68SatfP_8s_AeQ6IHPsLJ6d3xxrG/pub?gid=1539830050&single=true&output=tsv",
        };

        let data = [];
        let index = 0;
        let showingBack = 0;
        let currentCategory = "letras";
        let isFirstLoad = true;

        // Persistência de filtros fixos com localStorage
        function salvarPreferencias() {
            const IDs = [
                "check-hiragana", "check-katakana", "check-kanji", "check-numero",
                "check-verbo-negativa", "check-verbo-dicionario", "check-verbo-te", "check-verbo-passado", "check-verbo-passadonegativo"
            ];
            const prefs = {};
            IDs.forEach(id => {
                const cb = document.getElementById(id);
                if (cb) prefs[id] = cb.checked;
            });
            localStorage.setItem("hoshimichi_filters_v3", JSON.stringify(prefs));
        }

        function carregarPreferencias() {
            const saved = localStorage.getItem("hoshimichi_filters_v3");
            if (!saved) return;
            const prefs = JSON.parse(saved);

            for (const id in prefs) {
                const cb = document.getElementById(id);
                if (cb) cb.checked = prefs[id];
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        async function mudarCategoria(cat, btn) {
            // Permitir recarregar categorias com filtros
            if (currentCategory === cat && cat !== 'letras' && cat !== 'números') return;

            currentCategory = cat;

            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            if (btn) btn.classList.add("active");

            // Esconder todos os containers de opções primeiro
            document.querySelectorAll(".options-container").forEach(opt => opt.classList.remove("visible"));

            // Mostrar o container correto
            if (cat === "letras") {
                document.getElementById("letras-options").classList.add("visible");
            } else if (cat === "números") {
                document.getElementById("números-options").classList.add("visible");
            } else if (cat === "vocabulário") {
                document.getElementById("vocabulário-options").classList.add("visible");
            } else if (cat === "Verbos") {
                document.getElementById("verbos-options").classList.add("visible");
            }

            await loadCategory();
            salvarPreferencias();
        }

        async function loadCategory() {
            isFirstLoad = false;
            salvarPreferencias();
            if (currentCategory === "letras") {
                data = [];
                const hira = document.getElementById("check-hiragana").checked;
                const kata = document.getElementById("check-katakana").checked;
                const kanji = document.getElementById("check-kanji").checked;

                if (hira) data = [...data, ...hiraganaData];
                if (kata) data = [...data, ...katakanaData];

                if (kanji) {
                    try {
                        const res = await fetch(urls.kanji);
                        const text = await res.text();
                        const kanjiData = text.trim().split("\n").map(l => l.split("\t"));
                        data = [...data, ...kanjiData];
                    } catch (e) {
                        console.error("Erro ao carregar Kanji", e);
                    }
                }

                if (data.length === 0) {
                    alert("Selecione pelo menos uma opção!");
                    return;
                }

                shuffleArray(data);
            } else if (currentCategory === "números") {
                try {
                    const res = await fetch(urls.números);
                    const text = await res.text();
                    const rawData = text.trim().split("\n")
                        .map(l => l.split("\t"))
                        .filter(row => row.length >= 5 && (row[0].trim() !== "" || row[1].trim() !== ""));

                    gerarCheckboxes(rawData, "dynamic-filters-números");

                    const filtrosAtivos = {};
                    filtrosAtivos["basico"] = document.getElementById("check-numero").checked;

                    document.querySelectorAll("#dynamic-filters-números input[type=checkbox]").forEach(cb => {
                        filtrosAtivos[cb.dataset.grupo] = cb.checked;
                    });

                    data = rawData.filter(row => {
                        const grupoRaw = row[4].trim().toLowerCase();
                        const grupo = grupoRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        return filtrosAtivos[grupo];
                    }).map(row => {
                        return [row[0], `${row[1]} (${row[2]})`];
                    });

                    if (data.length === 0) {
                        alert("Selecione pelo menos uma opção de filtros!");
                        return;
                    }

                    shuffleArray(data);
                } catch (e) {
                    console.error("Erro ao carregar Números", e);
                }
            } else if (currentCategory === "vocabulário") {
                try {
                    const res = await fetch(urls.vocabulário);
                    const text = await res.text();
                    const rawData = text.trim().split("\n")
                        .map(l => l.split("\t"))
                        .filter(row => row.length >= 4 && (row[0].trim() !== "" || row[1].trim() !== ""));

                    console.log("Dados brutos de Vocabulário:", rawData);
                    gerarCheckboxes(rawData, "dynamic-filters-vocabulário");

                    const filtrosAtivos = {};
                    document.querySelectorAll("#dynamic-filters-vocabulário input[type=checkbox]").forEach(cb => {
                        filtrosAtivos[cb.dataset.grupo] = cb.checked;
                    });

                    data = rawData.filter(row => {
                        const grupoRaw = row[3].trim().toLowerCase();
                        const grupo = grupoRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        return filtrosAtivos[grupo];
                    }).map(row => {
                        const kanji = row[0].trim();
                        const hira = row[1].trim();
                        const trad = row[2].trim();

                        // Se não tem kanji (ou se o kanji é igual ao hiragana), faz só 2 passos
                        if (!kanji || kanji === hira) return [hira, trad];

                        // Caminho: Kanji -> Hiragana -> Tradução
                        return [kanji, hira, trad];
                    });

                    if (data.length === 0) {
                        alert("Selecione pelo menos uma opção de filtros!");
                        return;
                    }

                    shuffleArray(data);
                } catch (e) {
                    console.error("Erro ao carregar Vocabulário", e);
                }
            } else if (currentCategory === "Verbos") {
                try {
                    const url = urls.verbos;
                    if (!url) {
                        alert("URL dos Verbos não configurada. Adicione o TSV no código!");
                        return;
                    }
                    const res = await fetch(url);
                    const text = await res.text();
                    
                    const rawData = text.trim().split("\n")
                        .map(l => l.split("\t"))
                        .filter(row => row.length >= 2 && row[0].trim() !== "");

                    const negOn = document.getElementById("check-verbo-negativa").checked;
                    const dicOn = document.getElementById("check-verbo-dicionario").checked;
                    const teOn = document.getElementById("check-verbo-te").checked;
                    const passOn = document.getElementById("check-verbo-passado").checked;
                    const passNegOn = document.getElementById("check-verbo-passadonegativo").checked;

                    data = [];
                    // Pular cabeçalho, se existir
                    let startIndex = 0;
                    if (rawData.length > 0 && rawData[0][0].toLowerCase().includes("forma")) {
                        startIndex = 1;
                    }

                    for (let i = startIndex; i < rawData.length; i++) {
                        const row = rawData[i];
                        const base = row[0]; // Frente da carta (Forma Masu)

                        if (!base || base.trim() === "") continue;

                        if (negOn && row.length > 1 && row[1].trim()) data.push([base + "\n(Negativa)", row[1]]);
                        if (dicOn && row.length > 2 && row[2].trim()) data.push([base + "\n(Dicionário)", row[2]]);
                        if (teOn && row.length > 3 && row[3].trim()) data.push([base + "\n(Forma TE)", row[3]]);
                        if (passOn && row.length > 4 && row[4].trim()) data.push([base + "\n(Passado)", row[4]]);
                        if (passNegOn && row.length > 5 && row[5].trim()) data.push([base + "\n(Pass. Negativo)", row[5]]);
                    }

                    if (data.length === 0) {
                        alert("Nenhuma forma selecionada ou dados vazios!");
                        return;
                    }

                    shuffleArray(data);
                } catch (e) {
                    console.error("Erro ao carregar Verbos", e);
                    alert("Erro ao carregar Verbos. Verifique a URL.");
                    return;
                }
            } else {
                try {
                    const url = urls[currentCategory];
                    const res = await fetch(url);
                    const text = await res.text();
                    
                    data = text.trim().split("\n")
                        .map(l => l.split("\t"))
                        .filter(row => row.length >= 2 && row[0].trim() !== "");

                    if (data.length === 0) {
                        alert("Nenhuma pergunta encontrada!");
                        return;
                    }

                    // Pular a primeira linha se for cabeçalho
                    if (data.length > 0 && data[0][0].toLowerCase().includes("pergunta")) {
                        data.shift();
                    }

                    shuffleArray(data);
                } catch (e) {
                    console.error("Erro ao carregar " + currentCategory, e);
                    alert("Erro ao carregar " + currentCategory);
                    return;
                }
            }

            index = 0;
            showingBack = 0;
            mostrarCard();
        }

        function proximo() {
            if (isFirstLoad) {
                loadCategory();
                return;
            }
            index = (index + 1) % data.length;
            showingBack = 0;
            mostrarCard();
        }

        function mostrarCard() {
            const card = document.getElementById("card");

            if (isFirstLoad) {
                card.innerHTML = "Clique no card para ver a leitura";
                card.style.fontSize = "1.5rem";
                return;
            }

            if (!data || data.length === 0) {
                card.innerText = "Nenhum dado carregado";
                return;
            }

            const currentCard = data[index];
            const currentPhase = Math.min(showingBack, currentCard.length - 1);

            card.innerText = currentCard[currentPhase];

            if (currentCategory === "perguntas") {
                card.style.fontSize = currentCard[currentPhase].length > 50 ? "1.2rem" : "1.6rem";
            } else if (currentPhase === 0 && currentCard.length > 2) {
                card.style.fontSize = "4rem";
            } else if (currentPhase === currentCard.length - 1) {
                card.style.fontSize = "1.6rem";
            } else {
                card.style.fontSize = "2.8rem";
            }
        }

        function gerarCheckboxes(rawData, containerId) {
            const container = document.getElementById(containerId);

            if (container.innerHTML !== "") return;

            const grupos = new Set();
            rawData.forEach(row => {
                if (row.length < 4) return;
                const colIndex = containerId === "dynamic-filters-vocabulário" ? 3 : 4;
                let grupo = row[colIndex].trim().toLowerCase()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (containerId === "dynamic-filters-números" && grupo === "basico") return;

                grupos.add(grupo);
            });

            grupos.forEach(grupo => {
                const label = document.createElement("label");
                // Vocabulário vem tudo marcado por padrão, Números vem desmarcado
                const isChecked = containerId === "dynamic-filters-vocabulário";

                label.innerHTML = `
                    <input type="checkbox" data-grupo="${grupo}" ${isChecked ? 'checked' : ''} onchange="loadCategory()">
                    ${grupo.charAt(0).toUpperCase() + grupo.slice(1)}
                `;
                container.appendChild(label);
            });
        }

        document.getElementById("card").onclick = () => {
            if (isFirstLoad) {
                loadCategory();
                return;
            }
            showingBack++;
            if (showingBack >= data[index].length) {
                showingBack = 0;
            }
            mostrarCard();
        };

        function anterior() {
            if (isFirstLoad) return;
            index = (index - 1 + data.length) % data.length;
            showingBack = 0;
            mostrarCard();
        }

        function createStars() {
            for (let i = 0; i < 150; i++) {
                let star = document.createElement("div");
                star.classList.add("stars");
                star.style.left = Math.random() * 100 + "vw";
                star.style.top = Math.random() * 100 + "vh";
                star.style.animationDuration = (Math.random() * 2 + 1) + "s";
                document.body.appendChild(star);
            }
        }

        createStars();
        carregarPreferencias();
        mostrarCard();

        // Funções para o Modal de Feedback
        function toggleModal(show) {
            const modal = document.getElementById('feedback-modal');
            if (show) {
                modal.classList.add('visible');
            } else {
                modal.classList.remove('visible');
                // Limpa campos ao fechar sem enviar
                document.getElementById('fb-nome').value = '';
                document.getElementById('fb-mensagem').value = '';
            }
        }

        async function enviarFeedback() {
            const nome = document.getElementById('fb-nome').value.trim();
            const mensagem = document.getElementById('fb-mensagem').value.trim();
            const btn = document.getElementById('btn-submit-fb');

            if (!nome || !mensagem) {
                alert("Por favor, preencha todos os campos antes de enviar. ✨");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enviando...";

            // URL do seu Google Apps Script
            const SCRIPT_URL = "URL_DO_SEU_WEB_APP_AQUI";

            if (SCRIPT_URL === "URL_DO_SEU_WEB_APP_AQUI") {
                alert("Erro: Você precisa configurar a URL do Apps Script primeiro! ✨");
                btn.disabled = false;
                btn.innerText = "Enviar";
                return;
            }

            try {
                const params = new URLSearchParams();
                params.append("nome", nome);
                params.append("mensagem", mensagem);
                params.append("timestamp", new Date().toLocaleString("pt-BR"));

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors' // Essencial para GAS
                });

                alert("Obrigado! Sua mensagem foi enviada com sucesso. ✨🌌");
                toggleModal(false);
            } catch (error) {
                console.error("Erro ao enviar feedback:", error);
                alert("Houve um pequeno problema ao brilhar sua mensagem. Tente novamente mais tarde! 🌠");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar";
            }
        }

    </script>
